<!DOCTYPE html>

<html lang="kk"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>1Bilim - Chat</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Manrope:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "ob-blue": "#2F7DC1",
                        "ob-orange": "#EF7D00",
                        "on-background": "#1a1c1c",
                        "on-secondary-container": "#694000",
                        "surface-container-lowest": "#ffffff",
                        "background": "#ffffff",
                        "on-secondary-fixed-variant": "#663e00",
                        "surface-container-low": "#f3f3f3",
                        "on-tertiary-container": "#003559",
                        "on-surface": "#1a1c1c",
                        "surface": "#ffffff",
                        "surface-bright": "#ffffff",
                        "primary-fixed-dim": "#ffb691",
                        "inverse-surface": "#2f3131",
                        "on-secondary": "#ffffff",
                        "surface-variant": "#e2e2e2",
                        "tertiary": "#00629f",
                        "on-surface-variant": "#594136",
                        "outline": "#8d7164",
                        "secondary-container": "#fda625",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#ffddb9",
                        "surface-tint": "#9e4200",
                        "primary-fixed": "#ffdbcb",
                        "secondary": "#865300",
                        "inverse-primary": "#ffb691",
                        "primary-container": "#ff6f00",
                        "tertiary-container": "#08a1ff",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "on-primary-fixed-variant": "#793100",

                        "primary": "#9e4200",
                        "tertiary-fixed": "#cfe4ff",
                        "tertiary-fixed-dim": "#9acbff",
                        "error": "#ba1a1a",
                        "surface-container-high": "#e8e8e8",
                        "on-primary-container": "#592200",
                        "on-tertiary-fixed": "#001d34",
                        "outline-variant": "#e1bfb0",
                        "on-primary-fixed": "#341100",
                        "on-tertiary-fixed-variant": "#004a79",
                        "surface-container-highest": "#e2e2e2",
                        "on-secondary-fixed": "#2b1700",
                        "surface-dim": "#dadada",
                        "secondary-fixed-dim": "#ffb961"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px",
                        "bubble": "20px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body antialiased flex flex-col h-screen overflow-hidden">
<!-- TopAppBar -->
<header class="w-full sticky top-0 z-40 bg-surface flex items-center justify-center px-6 py-4 border-b border-surface-container-highest">
<h1 class="font-headline font-bold text-2xl tracking-tight flex items-center">
<span class="text-ob-blue">one</span><span class="text-ob-orange">bilim</span>
</h1>
</header>
<!-- Chat Area -->
<main class="flex-1 overflow-y-auto px-4 py-6 flex flex-col gap-8 bg-surface">
<!-- Date Pill -->
<div class="flex justify-center mb-2">
<span class="bg-surface-container-high text-on-surface-variant font-label text-[10px] tracking-widest uppercase px-3 py-1 rounded-full shadow-[0_4px_12px_rgba(26,28,28,0.03)]">
                Бүгін
            </span>
</div>
<!-- Curator Bubble (Incoming) -->
<div class="flex flex-col gap-1 self-start w-full max-w-[90%]">
<div class="flex justify-end w-[80%] pr-2">
<div class="flex items-center gap-2">
<span class="text-[12px] text-gray-500 font-medium">Мариям / Куратор</span>
<div class="w-6 h-6 rounded-full bg-ob-orange flex items-center justify-center text-white font-headline font-bold text-[10px]">
                М
            </div>
</div>
</div>
<div class="bg-ob-orange text-white rounded-bubble rounded-tl-none p-5 w-[80%] shadow-md">
<p class="text-base font-medium leading-relaxed font-headline">Сәлем! Сабақ 4-тің тапсырмасын тексердім 👍</p>
<div class="flex items-center justify-end gap-1 mt-2 opacity-80">
<span class="text-[10px]">14:30</span>
</div>
</div>
</div>
<!-- Student Bubble (Outgoing) -->
<div class="flex flex-col gap-1 self-end w-full max-w-[90%] items-end">
<div class="bg-ob-blue text-white rounded-bubble rounded-br-none p-5 w-[80%] shadow-md">
<p class="text-base font-medium leading-relaxed font-headline">Жақсы, рақмет! Бүгін бере аламын ба?</p>
<div class="flex items-center justify-end gap-1 mt-2 opacity-80">
<span class="text-[10px]">14:35</span>
<span class="material-symbols-outlined text-[14px]">done_all</span>
</div>
</div>
<div class="flex justify-start w-[80%] pl-2">
<div class="flex items-center gap-2">
<div class="w-6 h-6 rounded-full bg-ob-blue flex items-center justify-center text-white font-headline font-bold text-[10px]">
                А
            </div>
<span class="text-[12px] text-gray-500 font-medium">Аслан / Оқушы</span>
</div>
</div>
</div>
<!-- File Message (Outgoing) -->
<div class="flex flex-col gap-1 self-end w-full max-w-[90%] items-end mt-4">
<div class="bg-ob-blue text-white rounded-bubble rounded-br-none p-5 w-[80%] shadow-md flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined fill text-2xl">description</span>
</div>
<div class="flex-1">
<p class="text-base font-semibold font-headline">essay_v2.pdf</p>
<p class="text-xs opacity-80 font-medium mt-0.5">2.4 MB</p>
</div>
<div class="flex items-center justify-end gap-1 mt-auto ml-2 opacity-80 self-end">
<span class="text-[10px]">14:38</span>
<span class="material-symbols-outlined text-[14px]">done_all</span>
</div>
</div>
<div class="flex justify-start w-[80%] pl-2">
<div class="flex items-center gap-2">
<div class="w-6 h-6 rounded-full bg-ob-blue flex items-center justify-center text-white font-headline font-bold text-[10px]">
                А
            </div>
<span class="text-[12px] text-gray-500 font-medium">Аслан / Оқушы</span>
</div>
</div>
</div>
<!-- Audio Message (Incoming) -->
<div class="flex flex-col gap-1 self-start w-full max-w-[90%] mt-4">
<div class="flex justify-end w-[80%] pr-2">
<div class="flex items-center gap-2">
<span class="text-[12px] text-gray-500 font-medium">Мариям / Куратор</span>
<div class="w-6 h-6 rounded-full bg-ob-orange flex items-center justify-center text-white font-headline font-bold text-[10px]">
                М
            </div>
</div>
</div>
<div class="bg-ob-orange text-white rounded-bubble rounded-tl-none p-4 w-[80%] shadow-md flex flex-col">
<div class="flex items-center gap-3">
<button class="w-10 h-10 rounded-full bg-white text-ob-orange flex items-center justify-center shadow-sm shrink-0">
<span class="material-symbols-outlined fill pl-0.5">play_arrow</span>
</button>
<!-- Waveform Simulation -->
<div class="flex items-center gap-[3px] h-8 flex-1">
<div class="w-[3px] h-3 bg-white rounded-full opacity-60"></div>
<div class="w-[3px] h-5 bg-white rounded-full opacity-80"></div>
<div class="w-[3px] h-7 bg-white rounded-full"></div>
<div class="w-[3px] h-4 bg-white rounded-full opacity-70"></div>
<div class="w-[3px] h-2 bg-white rounded-full opacity-40"></div>
<div class="w-[3px] h-6 bg-white rounded-full opacity-90"></div>
<div class="w-[3px] h-3 bg-white rounded-full opacity-50"></div>
<div class="w-[3px] h-2 bg-white/40 rounded-full"></div>
<div class="w-[3px] h-2 bg-white/40 rounded-full"></div>
<div class="w-[3px] h-2 bg-white/40 rounded-full"></div>
</div>
<span class="text-sm font-medium font-headline">0:45</span>
</div>
<div class="flex items-center justify-end gap-1 mt-2 opacity-80">
<span class="text-[10px]">14:42</span>
</div>
</div>
</div>
<!-- Typing Indicator -->
<div class="flex flex-col gap-1 self-start w-full max-w-[90%] mt-4">
<div class="flex justify-end w-[80%] pr-2">
<div class="flex items-center gap-2">
<span class="text-[12px] text-gray-500 font-medium">Мариям / Куратор</span>
<div class="w-6 h-6 rounded-full bg-ob-orange flex items-center justify-center text-white font-headline font-bold text-[10px]">
                М
            </div>
</div>
</div>
<div class="bg-ob-orange text-white rounded-bubble rounded-tl-none p-5 w-auto shadow-md flex items-center gap-1.5 self-start">
<div class="w-2 h-2 bg-white rounded-full animate-bounce" style="animation-delay: 0s;"></div>
<div class="w-2 h-2 bg-white rounded-full animate-bounce" style="animation-delay: 0.2s;"></div>
<div class="w-2 h-2 bg-white rounded-full animate-bounce" style="animation-delay: 0.4s;"></div>
</div>
</div>
</main>
<!-- Input Bar -->
<div class="bg-white/70 dark:bg-white/70 backdrop-blur-xl px-4 py-3 pb-8 shadow-[0_-8px_32px_rgba(26,28,28,0.06)] sticky bottom-0 w-full z-50">
<div class="flex items-center gap-2">
<button class="w-10 h-10 rounded-full flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[28px]">add</span>
</button>
<div class="flex-1 bg-surface-container-lowest border border-surface-container-highest rounded-full px-4 py-2 flex items-center gap-2 shadow-[0_2px_8px_rgba(26,28,28,0.02)]">
<input class="flex-1 bg-transparent border-none focus:ring-0 text-sm text-on-surface placeholder:text-on-surface-variant/50 p-0 font-headline" placeholder="Хабарлама жазыңыз..." type="text"/>
<button class="text-on-surface-variant hover:text-ob-orange transition-colors">
<span class="material-symbols-outlined">mic</span>
</button>
</div>
<button class="w-12 h-12 rounded-full bg-ob-orange text-white flex items-center justify-center shadow-[0_4px_16px_rgba(239,125,0,0.2)] hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined pl-1">send</span>
</button>
</div>
</div>
</body></html>
